    <script>
      // SW + cache maintenance: runs only AFTER first user interaction OR
      // after a few seconds of idle time post-load. Emits User Timing marks
      // so you can correlate this work with "Forced reflow" entries in DevTools
      // Performance / Lighthouse traces (filter by "salb:").
      (function () {
        var scheduled = false;
        var IDLE_DELAY_MS = 6000;     // wait this long if user never interacts
        var INTERACTION_DELAY_MS = 800; // small grace after first interaction

        function mark(name) {
          try { performance.mark('salb:' + name); } catch (e) {}
        }
        function measure(name, start, end) {
          try { performance.measure('salb:' + name, 'salb:' + start, 'salb:' + end); } catch (e) {}
        }

        mark('boot');

        function runMaintenance(trigger) {
          if (scheduled) return;
          scheduled = true;
          mark('maint-scheduled-' + trigger);

          var run = function () {
            mark('maint-start');
            try {
              if ('serviceWorker' in navigator) {
                mark('sw-update-start');
                navigator.serviceWorker.getRegistrations().then(function (registrations) {
                  for (var i = 0; i < registrations.length; i++) {
                    registrations[i].update();
                  }
                  mark('sw-update-end');
                  measure('sw-update', 'sw-update-start', 'sw-update-end');
                }).catch(function () {});

                navigator.serviceWorker.addEventListener('controllerchange', function () {
                  if (document.visibilityState === 'hidden') {
                    window.location.reload();
                  } else {
                    document.addEventListener('visibilitychange', function onHide() {
                      if (document.visibilityState === 'hidden') {
                        document.removeEventListener('visibilitychange', onHide);
                        window.location.reload();
                      }
                    });
                  }
                });
              }
              if ('caches' in window) {
                mark('cache-purge-start');
                caches.keys().then(function (names) {
                  for (var i = 0; i < names.length; i++) {
                    if (
                      names[i].indexOf('workbox-precache') === -1 &&
                      names[i].indexOf('google-fonts') === -1 &&
                      names[i].indexOf('gstatic-fonts') === -1
                    ) {
                      caches.delete(names[i]);
                    }
                  }
                  mark('cache-purge-end');
                  measure('cache-purge', 'cache-purge-start', 'cache-purge-end');
                }).catch(function () {});
              }
            } catch (e) {}
            mark('maint-end');
            measure('maint-total', 'maint-start', 'maint-end');
          };

          if ('requestIdleCallback' in window) {
            window.requestIdleCallback(run, { timeout: 4000 });
          } else {
            setTimeout(run, 200);
          }
        }

        var interactionEvents = ['pointerdown', 'keydown', 'touchstart', 'scroll'];
        function onInteraction() {
          interactionEvents.forEach(function (ev) {
            window.removeEventListener(ev, onInteraction, { passive: true });
          });
          if (idleTimer) clearTimeout(idleTimer);
          setTimeout(function () { runMaintenance('interaction'); }, INTERACTION_DELAY_MS);
        }

        var idleTimer = null;
        function armTriggers() {
          interactionEvents.forEach(function (ev) {
            window.addEventListener(ev, onInteraction, { passive: true, once: false });
          });
          idleTimer = setTimeout(function () { runMaintenance('idle'); }, IDLE_DELAY_MS);
        }

        if (document.readyState === 'complete') {
          armTriggers();
        } else {
          window.addEventListener('load', armTriggers, { once: true });
        }
      })();
    </script>
